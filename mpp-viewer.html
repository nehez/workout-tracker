<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPP File Viewer</title>
  <link rel="stylesheet" href="mpp-viewer.css">
</head>
<body>

  <header>
    <span class="logo">MPP Viewer</span>
    <span class="subtitle">Microsoft Project file reader — runs entirely in your browser</span>
  </header>

  <main>
    <div id="upload-zone">
      <div id="upload-inner">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Drop <strong>.mpp</strong> file here or <label for="file-input">browse</label></p>
        <p class="hint">No data leaves your browser</p>
        <input type="file" id="file-input" accept=".mpp,.MPP">
      </div>
    </div>

    <div id="loading" hidden>
      <div class="spinner"></div>
      <p>Loading MPXJ parser &amp; reading file…</p>
    </div>

    <div id="error-box" hidden>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="error-msg"></span>
      <button id="reset-btn">Try again</button>
    </div>

    <section id="results" hidden>
      <div id="project-info">
        <div class="info-item"><span class="info-label">Project</span><span id="proj-name">—</span></div>
        <div class="info-item"><span class="info-label">Start</span><span id="proj-start">—</span></div>
        <div class="info-item"><span class="info-label">Finish</span><span id="proj-finish">—</span></div>
        <div class="info-item"><span class="info-label">Tasks</span><span id="proj-count">—</span></div>
        <button id="reset-btn2">Open another</button>
      </div>

      <div id="table-wrap">
        <table id="task-table">
          <thead>
            <tr>
              <th class="col-id">#</th>
              <th class="col-name">Task Name</th>
              <th class="col-date">Start</th>
              <th class="col-date">Finish</th>
              <th class="col-dur">Duration</th>
              <th class="col-pct">% Done</th>
            </tr>
          </thead>
          <tbody id="task-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="mpp-viewer.js"></script>
</body>
</html>
