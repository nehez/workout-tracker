<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPP Viewer</title>
  <link rel="stylesheet" href="mpp-viewer.css" />
</head>
<body>
  <header>
    <div class="logo">MPP Viewer</div>
    <div class="subtitle">Microsoft Project file viewer — 100% client-side</div>
  </header>

  <main>
    <!-- Upload state -->
    <section id="state-upload" class="state active">
      <div id="drop-zone" class="drop-zone" role="button" tabindex="0" aria-label="Drop zone for MPP files">
        <div class="drop-icon">📂</div>
        <p class="drop-title">Drag &amp; drop your <strong>.mpp</strong> file here</p>
        <p class="drop-sub">or</p>
        <label class="btn btn-accent" for="file-input">Browse files</label>
        <input id="file-input" type="file" accept=".mpp,.MPP" aria-label="Select MPP file" />
      </div>
    </section>

    <!-- Loading state -->
    <section id="state-loading" class="state">
      <div class="loading-box">
        <div class="spinner" aria-label="Loading"></div>
        <p class="loading-text">Parsing project file…</p>
      </div>
    </section>

    <!-- Error state -->
    <section id="state-error" class="state">
      <div class="error-box">
        <div class="error-icon">⚠️</div>
        <p id="error-message" class="error-message">An error occurred.</p>
        <button id="btn-try-again" class="btn btn-accent">Try again</button>
      </div>
    </section>

    <!-- Results state -->
    <section id="state-results" class="state">
      <div class="project-info-bar">
        <div class="project-meta">
          <span class="meta-item"><span class="meta-label">Project</span><span id="meta-name" class="meta-value">—</span></span>
          <span class="meta-item"><span class="meta-label">Start</span><span id="meta-start" class="meta-value">—</span></span>
          <span class="meta-item"><span class="meta-label">Finish</span><span id="meta-finish" class="meta-value">—</span></span>
          <span class="meta-item"><span class="meta-label">Tasks</span><span id="meta-count" class="meta-value">—</span></span>
        </div>
        <button id="btn-open-another" class="btn btn-outline">Open another</button>
      </div>

      <div class="table-wrapper">
        <table id="task-table">
          <thead>
            <tr>
              <th class="col-id">ID</th>
              <th class="col-name">Name</th>
              <th class="col-start">Start</th>
              <th class="col-finish">Finish</th>
              <th class="col-duration">Duration</th>
              <th class="col-complete">% Complete</th>
            </tr>
          </thead>
          <tbody id="task-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="mpp-viewer.js"></script>
</body>
</html>
